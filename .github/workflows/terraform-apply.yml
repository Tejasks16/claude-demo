name: Terraform Auto-Apply

# Trigger on push to main branch (after PR merge)
on:
  push:
    branches:
      - main
    paths:
      - '**.tf'
      - '**.tfvars'
      - '.github/workflows/terraform-apply.yml'

# Prevent concurrent deployments
concurrency:
  group: terraform-apply
  cancel-in-progress: false

# OIDC token permissions for AWS authentication
permissions:
  id-token: write      # Required for OIDC
  contents: read       # Required for checking out code
  issues: write        # Required for creating issues on failure

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.9.8

jobs:
  # ============================================================================
  # Job 1: Terraform Apply
  # ============================================================================
  apply:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    environment:
      name: development
      url: https://console.aws.amazon.com/eks/home?region=us-east-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-TerraformApply-${{ github.run_id }}
          role-duration-seconds: 3600  # 1 hour for long-running applies

      - name: Verify AWS Identity
        run: |
          echo "🔐 AWS Authentication Details"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Account ID: $(aws sts get-caller-identity --query Account --output text)"
          echo "User ARN: $(aws sts get-caller-identity --query Arn --output text)"
          echo "Region: ${{ env.AWS_REGION }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Terraform Init
        id: init
        run: |
          echo "🚀 Initializing Terraform"
          terraform init

      - name: Terraform Plan
        id: plan
        run: |
          echo "📋 Generating Terraform Plan"
          terraform plan \
            -var-file="environments/dev/terraform.tfvars" \
            -out=tfplan \
            -no-color | tee plan-output.txt

      - name: Analyze Plan
        id: analyze
        run: |
          echo "🔍 Analyzing Plan Changes"

          # Extract resource counts
          if grep -q "No changes" plan-output.txt; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✅ No infrastructure changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT

            # Extract the plan summary
            PLAN_SUMMARY=$(grep -E "Plan:" plan-output.txt || echo "Changes detected")
            echo "summary=$PLAN_SUMMARY" >> $GITHUB_OUTPUT
            echo "📊 $PLAN_SUMMARY"
          fi

      - name: Terraform Apply
        id: apply
        if: steps.analyze.outputs.has_changes == 'true'
        run: |
          echo "🚀 Applying Terraform Changes"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          terraform apply \
            -auto-approve \
            -no-color \
            tfplan | tee apply-output.txt

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Terraform Apply Completed Successfully"

      - name: Extract Outputs
        id: outputs
        if: steps.apply.outcome == 'success' || steps.analyze.outputs.has_changes == 'false'
        run: |
          echo "📤 Extracting Terraform Outputs"

          # Get all outputs in JSON format
          terraform output -json > outputs.json

          # Extract key outputs
          CLUSTER_NAME=$(terraform output -raw cluster_name 2>/dev/null || echo "N/A")
          CLUSTER_ENDPOINT=$(terraform output -raw cluster_endpoint 2>/dev/null || echo "N/A")
          VPC_ID=$(terraform output -raw vpc_id 2>/dev/null || echo "N/A")
          CONFIGURE_KUBECTL=$(terraform output -raw configure_kubectl 2>/dev/null || echo "N/A")

          echo "cluster_name=$CLUSTER_NAME" >> $GITHUB_OUTPUT
          echo "cluster_endpoint=$CLUSTER_ENDPOINT" >> $GITHUB_OUTPUT
          echo "vpc_id=$VPC_ID" >> $GITHUB_OUTPUT
          echo "configure_kubectl=$CONFIGURE_KUBECTL" >> $GITHUB_OUTPUT

      - name: Upload Outputs as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: terraform-outputs
          path: |
            outputs.json
            plan-output.txt
            apply-output.txt
          retention-days: 90

      - name: Post-Deployment Verification
        id: verify
        if: steps.apply.outcome == 'success'
        run: |
          echo "🔍 Running Post-Deployment Verification"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          CLUSTER_NAME=$(terraform output -raw cluster_name)

          # Check EKS cluster status
          CLUSTER_STATUS=$(aws eks describe-cluster \
            --name $CLUSTER_NAME \
            --query 'cluster.status' \
            --output text)

          echo "Cluster Status: $CLUSTER_STATUS"

          if [ "$CLUSTER_STATUS" == "ACTIVE" ]; then
            echo "✅ EKS Cluster is ACTIVE"
            echo "status=healthy" >> $GITHUB_OUTPUT
          else
            echo "⚠️ EKS Cluster status: $CLUSTER_STATUS"
            echo "status=unhealthy" >> $GITHUB_OUTPUT
          fi

          # Check node group status
          NODE_GROUP_STATUS=$(aws eks describe-nodegroup \
            --cluster-name $CLUSTER_NAME \
            --nodegroup-name main \
            --query 'nodegroup.status' \
            --output text 2>/dev/null || echo "N/A")

          echo "Node Group Status: $NODE_GROUP_STATUS"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Update kubeconfig and Check Cluster
        id: kubectl_check
        if: steps.apply.outcome == 'success'
        run: |
          echo "🔧 Configuring kubectl"

          CLUSTER_NAME=$(terraform output -raw cluster_name)

          # Update kubeconfig
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name $CLUSTER_NAME

          # Wait for cluster to be ready
          echo "⏳ Waiting for cluster to be ready..."
          sleep 30

          # Get nodes
          echo "📋 Cluster Nodes:"
          kubectl get nodes -o wide || echo "Unable to retrieve nodes"

          # Get all pods
          echo "📋 All Pods:"
          kubectl get pods -A || echo "Unable to retrieve pods"

      - name: Generate Deployment Summary
        id: summary
        if: always()
        run: |
          cat > deployment-summary.md << 'EOF'
          # 🚀 Terraform Deployment Summary

          ## Deployment Details
          - **Workflow Run**: ${{ github.run_id }}
          - **Triggered by**: @${{ github.actor }}
          - **Commit**: ${{ github.sha }}
          - **Branch**: ${{ github.ref_name }}
          - **Timestamp**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')

          ## Status
          - **Init**: ${{ steps.init.outcome }}
          - **Plan**: ${{ steps.plan.outcome }}
          - **Apply**: ${{ steps.apply.outcome }}
          - **Verification**: ${{ steps.verify.outcome }}

          ## Infrastructure Details
          - **Cluster Name**: ${{ steps.outputs.outputs.cluster_name }}
          - **VPC ID**: ${{ steps.outputs.outputs.vpc_id }}
          - **Region**: ${{ env.AWS_REGION }}
          - **Health Status**: ${{ steps.verify.outputs.status }}

          ## Access Instructions
          Configure kubectl to access your cluster:
          ```bash
          ${{ steps.outputs.outputs.configure_kubectl }}
          ```

          ## Next Steps
          1. Verify cluster health in AWS Console
          2. Deploy your applications using kubectl
          3. Configure monitoring and alerting
          4. Set up CI/CD pipelines for applications

          ---
          *Generated by GitHub Actions*
          EOF

          cat deployment-summary.md

      - name: Upload Deployment Summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deployment-summary
          path: deployment-summary.md
          retention-days: 90

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Terraform Apply Failed';
            const body = `## Deployment Failure Alert

            The Terraform apply workflow has failed.

            **Details:**
            - **Workflow Run**: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - **Commit**: ${{ github.sha }}
            - **Triggered by**: @${{ github.actor }}
            - **Branch**: ${{ github.ref_name }}
            - **Timestamp**: ${new Date().toISOString()}

            **Steps Status:**
            - Init: \`${{ steps.init.outcome }}\`
            - Plan: \`${{ steps.plan.outcome }}\`
            - Apply: \`${{ steps.apply.outcome }}\`
            - Verify: \`${{ steps.verify.outcome }}\`

            **Action Required:**
            1. Review the workflow logs
            2. Check AWS CloudWatch logs for EKS cluster issues
            3. Verify IAM permissions and quotas
            4. Fix the issues and re-run the workflow

            **Useful Commands:**
            \`\`\`bash
            # Check Terraform state
            terraform state list

            # View last apply logs
            terraform show

            # Manual rollback if needed
            terraform plan -destroy
            \`\`\`

            ---
            *This issue was automatically created by GitHub Actions*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['terraform', 'deployment-failure', 'urgent']
            });

  # ============================================================================
  # Job 2: Drift Detection (Scheduled Check)
  # ============================================================================
  drift-detection:
    name: Drift Detection
    runs-on: ubuntu-latest
    needs: apply
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-DriftDetection-${{ github.run_id }}

      - name: Terraform Init
        run: terraform init

      - name: Check for Drift
        id: drift
        run: |
          echo "🔍 Checking for Infrastructure Drift"

          terraform plan \
            -var-file="environments/dev/terraform.tfvars" \
            -detailed-exitcode \
            -no-color > drift-check.txt || EXITCODE=$?

          # Exit code 0 = no changes, 1 = error, 2 = changes detected
          if [ "$EXITCODE" == "2" ]; then
            echo "drift_detected=true" >> $GITHUB_OUTPUT
            echo "⚠️ Infrastructure drift detected"
          else
            echo "drift_detected=false" >> $GITHUB_OUTPUT
            echo "✅ No infrastructure drift detected"
          fi

      - name: Upload Drift Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drift-detection-report
          path: drift-check.txt
          retention-days: 30

      - name: Create Drift Issue
        if: steps.drift.outputs.drift_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const driftReport = fs.readFileSync('drift-check.txt', 'utf8');

            const title = '⚠️ Infrastructure Drift Detected';
            const body = `## Infrastructure Drift Alert

            Drift has been detected between the Terraform state and actual AWS infrastructure.

            **Details:**
            - **Detection Time**: ${new Date().toISOString()}
            - **Workflow Run**: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            <details><summary>Show Drift Report</summary>

            \`\`\`terraform
            ${driftReport.substring(0, 60000)}
            \`\`\`

            </details>

            **Recommended Actions:**
            1. Review the drift report to understand what changed
            2. Determine if changes were made outside of Terraform
            3. Either update Terraform to match AWS, or revert AWS changes
            4. Run \`terraform apply\` to reconcile state

            ---
            *This issue was automatically created by drift detection*`;

            // Check if an open drift issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift-detected'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['drift-detected', 'terraform', 'investigation-needed']
              });
            }

  # ============================================================================
  # Job 3: Deployment Notification
  # ============================================================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [apply, drift-detection]
    if: always()

    steps:
      - name: Deployment Success Notification
        if: needs.apply.result == 'success'
        run: |
          echo "✅ Deployment completed successfully!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Actor: ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          # Add Slack/email notification integration here if needed

      - name: Deployment Failure Notification
        if: needs.apply.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Actor: ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          # Add Slack/email notification integration here if needed
          exit 1
