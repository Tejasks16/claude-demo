name: Terraform PR Validation

# Trigger on pull requests to main branch
on:
  pull_request:
    branches:
      - main
    paths:
      - '**.tf'
      - '**.tfvars'
      - '.github/workflows/terraform-pr.yml'

# Prevent concurrent runs on the same PR
concurrency:
  group: terraform-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# OIDC token permissions for AWS authentication
permissions:
  id-token: write      # Required for OIDC
  contents: read       # Required for checking out code
  pull-requests: write # Required for commenting on PRs

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.11.3
  TFLINT_VERSION: v0.50.3
  TRIVY_VERSION: 0.58.1

jobs:
  # ============================================================================
  # Job 1: Code Quality and Security Checks
  # ============================================================================
  validate:
    name: Validate and Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -backend=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint
        id: tflint
        run: tflint --format compact --recursive
        continue-on-error: true

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        id: trivy
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'  # Don't fail the build, just report

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate Trivy Report (readable)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          output: 'trivy-report.txt'

      - name: Upload Trivy Report as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-security-report
          path: trivy-report.txt
          retention-days: 30

      - name: Comment validation results
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const MARKER = '<!-- terraform-validation-comment -->';

            // Delete previous validation comments
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            for (const comment of comments.data) {
              if (comment.body.includes(MARKER)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id
                });
              }
            }

            // Read Trivy report if exists
            let trivyReport = 'Trivy scan completed. Check artifacts for detailed report.';
            try {
              if (fs.existsSync('trivy-report.txt')) {
                trivyReport = fs.readFileSync('trivy-report.txt', 'utf8');
              }
            } catch (error) {
              console.log('Could not read Trivy report:', error);
            }

            const output = [
              MARKER,
              '#### Terraform Validation Results 🔍',
              '',
              '| Check | Status |',
              '|-------|--------|',
              '| 🎨 Format | `${{ steps.fmt.outcome }}` |',
              '| ⚙️ Init | `${{ steps.init.outcome }}` |',
              '| ✅ Validate | `${{ steps.validate.outcome }}` |',
              '| 🔍 TFLint | `${{ steps.tflint.outcome }}` |',
              '| 🛡️ Trivy | `${{ steps.trivy.outcome }}` |',
              '',
              '<details><summary>Show Trivy Security Scan Results</summary>',
              '',
              '```',
              trivyReport.substring(0, 60000),
              '```',
              '',
              '</details>',
              '',
              '**Note**: Full Trivy report available in workflow artifacts.',
              '',
              '*Pushed by: @${{ github.actor }}*',
              '*Action: `${{ github.event_name }}`*'
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # ============================================================================
  # Job 2: Terraform Plan with Drift Detection
  # ============================================================================
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false  # Required for output parsing

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-TerraformPR-${{ github.run_id }}

      - name: Verify AWS Identity
        run: |
          echo "AWS Account ID: $(aws sts get-caller-identity --query Account --output text)"
          echo "AWS User ARN: $(aws sts get-caller-identity --query Arn --output text)"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="environments/dev/terraform.tfvars" \
            -out=tfplan \
            -no-color
        continue-on-error: true

      - name: Save Plan Output
        if: always()
        run: |
          terraform show -no-color tfplan > tfplan.txt

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: terraform-plan
          path: |
            tfplan
            tfplan.txt
          retention-days: 30

      - name: Detect Drift
        id: drift
        if: steps.plan.outcome == 'success'
        run: |
          if grep -q "No changes" tfplan.txt; then
            echo "drift=false" >> $GITHUB_OUTPUT
            echo "No infrastructure drift detected ✅"
          else
            echo "drift=true" >> $GITHUB_OUTPUT
            echo "Infrastructure drift detected ⚠️"
          fi

      - name: Generate Plan Summary
        id: plan_summary
        if: always()
        run: |
          # Extract resource changes
          PLAN_SUMMARY=$(grep -E "Plan:|No changes" tfplan.txt || echo "Unable to parse plan")
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$PLAN_SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment PR with Plan
        uses: actions/github-script@v7
        if: always()
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const fs = require('fs');
            const MARKER = '<!-- terraform-plan-comment -->';

            // Delete previous plan comments
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            for (const comment of comments.data) {
              if (comment.body.includes(MARKER)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id
                });
              }
            }

            const plan = fs.readFileSync('tfplan.txt', 'utf8');
            const planSummary = `${{ steps.plan_summary.outputs.summary }}`;
            const drift = '${{ steps.drift.outputs.drift }}' === 'true';

            const maxLength = 60000;
            const truncatedPlan = plan.length > maxLength
              ? plan.substring(0, maxLength) + '\n\n... (truncated, see artifacts for full plan)'
              : plan;

            const output = [
              MARKER,
              '#### Terraform Plan Results 📊',
              '',
              `**Drift Detection**: ${drift ? '⚠️ Infrastructure drift detected' : '✅ No drift detected'}`,
              '',
              '**Plan Summary**:',
              '```',
              planSummary,
              '```',
              '',
              '<details><summary>Show Full Plan Output</summary>',
              '',
              '```terraform',
              truncatedPlan,
              '```',
              '',
              '</details>',
              '',
              '**Plan Status**: `${{ steps.plan.outcome }}`',
              '',
              '---',
              '',
              '**Next Steps**:',
              '- Review the plan carefully',
              '- Check for any unexpected changes',
              '- If approved, merge this PR to auto-apply changes',
              '',
              '*Pushed by: @${{ github.actor }}*',
              '*Workflow: `${{ github.workflow }}`*',
              '*Run ID: `${{ github.run_id }}`*'
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # ============================================================================
  # Job 3: Claude AI Code Review
  # ============================================================================
  claude-review:
    name: Claude AI Code Review
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'pull_request' && needs.plan.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan

      - name: Run Claude AI Code Review
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash .github/scripts/claude-review.sh tfplan.txt claude-review.md

      - name: Post Claude Review as PR Comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const MARKER = '<!-- claude-review-comment -->';

            // Delete previous Claude review comments
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            for (const comment of comments.data) {
              if (comment.body.includes(MARKER)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id
                });
              }
            }

            let reviewContent = 'Review not available.';
            try {
              if (fs.existsSync('claude-review.md')) {
                reviewContent = fs.readFileSync('claude-review.md', 'utf8').trim();
              }
            } catch (error) {
              reviewContent = `Error reading review: ${error.message}`;
            }

            const output = [
              MARKER,
              '#### Claude AI Code Review 🤖',
              '',
              reviewContent,
              '',
              '---',
              '*Reviewed by [Claude](https://claude.ai) (`claude-opus-4-6`) with adaptive thinking*',
              `*Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # ============================================================================
  # Job 4: PR Status Check
  # ============================================================================
  status:
    name: PR Status Check
    runs-on: ubuntu-latest
    needs: [validate, plan]
    if: always()

    steps:
      - name: Check validation status
        run: |
          if [[ "${{ needs.validate.result }}" != "success" ]]; then
            echo "❌ Validation failed"
            exit 1
          fi
          echo "✅ Validation passed"

      - name: Check plan status
        run: |
          if [[ "${{ needs.plan.result }}" != "success" ]]; then
            echo "❌ Plan failed"
            exit 1
          fi
          echo "✅ Plan completed successfully"

      - name: All checks passed
        run: |
          echo "✅ All PR checks passed successfully!"
          echo "You can now merge this PR to trigger auto-apply."
