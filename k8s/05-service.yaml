apiVersion: v1
kind: Service
metadata:
  name: demo-app-svc
  namespace: demo
  labels:
    app: demo-app
spec:
  # ClusterIP for internal access; change to LoadBalancer to get an AWS ELB
  type: ClusterIP
  selector:
    app: demo-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
---
# NodePort variant — useful if you want to hit the app from inside the VPC
apiVersion: v1
kind: Service
metadata:
  name: demo-app-nodeport
  namespace: demo
  labels:
    app: demo-app
spec:
  type: NodePort
  selector:
    app: demo-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
