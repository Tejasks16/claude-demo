# ─────────────────────────────────────────────────────────────
# ERROR PODS — intentionally broken for MCP health-check testing
# Each pod simulates a distinct failure mode.
# ─────────────────────────────────────────────────────────────

# 1. ImagePullBackOff — non-existent image tag
apiVersion: v1
kind: Pod
metadata:
  name: error-imagepull
  namespace: demo
  labels:
    scenario: image-pull-backoff
spec:
  containers:
    - name: bad-image
      image: nginx:this-tag-does-not-exist
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"

---
# 2. CrashLoopBackOff — container exits immediately
apiVersion: v1
kind: Pod
metadata:
  name: error-crashloop
  namespace: demo
  labels:
    scenario: crash-loop-backoff
spec:
  containers:
    - name: crasher
      image: busybox:1.36
      command: ["sh", "-c", "echo 'crashing now'; exit 1"]
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"

---
# 3. OOMKilled — container requests less memory than it actually uses
apiVersion: v1
kind: Pod
metadata:
  name: error-oom
  namespace: demo
  labels:
    scenario: oom-killed
spec:
  containers:
    - name: memory-hog
      image: polinux/stress
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "200M", "--vm-hang", "1"]
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "50Mi"   # limit intentionally lower than usage → OOMKilled

---
# 4. Pending — requests more CPU than any node can provide
apiVersion: v1
kind: Pod
metadata:
  name: error-pending
  namespace: demo
  labels:
    scenario: pending-unschedulable
spec:
  containers:
    - name: resource-hog
      image: nginx:1.25
      resources:
        requests:
          cpu: "9999"       # no node has 9999 cores
          memory: "1Mi"

---
# 5. Liveness probe failure → repeated restarts
apiVersion: v1
kind: Pod
metadata:
  name: error-liveness
  namespace: demo
  labels:
    scenario: liveness-probe-fail
spec:
  containers:
    - name: bad-probe
      image: nginx:1.25
      ports:
        - containerPort: 80
      livenessProbe:
        httpGet:
          path: /this-path-returns-404
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 2
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"

---
# 6. Wrong command / entrypoint — container exits with non-zero code
apiVersion: v1
kind: Pod
metadata:
  name: error-badcommand
  namespace: demo
  labels:
    scenario: bad-entrypoint
spec:
  containers:
    - name: bad-cmd
      image: nginx:1.25
      command: ["/this-binary-does-not-exist"]
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
